<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #F8F9FA;
    color: #2B2E60;
    min-height: 100vh;
  }
  .page-header {
    background: #1E2050;
    color: white;
    padding: 40px 48px;
  }
  .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .page-header p  { font-size: 14px; color: #C8D5DC; }

  .content {
    max-width: 860px;
    margin: 40px auto;
    padding: 0 24px 80px;
  }

  .section { margin-bottom: 40px; }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #31BBA6;
    margin-bottom: 12px;
  }

  .doc-list {
    background: white;
    border: 1px solid #E4E4ED;
    border-radius: 10px;
    overflow: hidden;
  }
  .doc-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #E4E4ED;
    text-decoration: none;
    color: inherit;
    transition: background 0.12s;
  }
  .doc-item:last-child { border-bottom: none; }
  .doc-item:hover { background: #F9FAFD; }

  .doc-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-right: 14px;
  }
  .doc-icon.html    { background: #e0f5f1; }
  .doc-icon.pdf     { background: #fef3f2; }
  .doc-icon.doc     { background: #eff6ff; }
  .doc-icon.generic { background: #f5f5f5; }

  .doc-info { flex: 1; min-width: 0; }
  .doc-name {
    font-size: 14px;
    font-weight: 600;
    color: #2B2E60;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .doc-meta { font-size: 12px; color: #6C757D; }

  .doc-arrow { color: #C8D5DC; font-size: 16px; margin-left: 12px; flex-shrink: 0; }

  .doc-left { display: flex; align-items: center; flex: 1; min-width: 0; }

  .empty-state {
    padding: 32px 20px;
    text-align: center;
    color: #6C757D;
    font-size: 14px;
  }

  .page-footer {
    text-align: center;
    font-size: 12px;
    color: #6C757D;
    padding: 24px;
    border-top: 1px solid #E4E4ED;
